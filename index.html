<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Doner Kebab – Chieti, Italy</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#c0392b;
  --gold:#f1c40f;
  --dark:#1a0a00;
  --dark2:#2c1200;
  --cream:#fff8ee;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--cream);overflow-x:hidden;}.hero{ min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; background:linear-gradient(to top,#2d0900,#0a0300); } .hero h1{ font-family:'Alfa Slab One'; font-size:4rem; color:var(--gold); } .hero p{opacity:0.8;margin-top:10px;}

.menu-section{ background:var(--dark2); padding:60px 16px; } .section-title{ text-align:center; font-family:'Alfa Slab One'; font-size:3rem; color:var(--gold); margin-bottom:30px; }

.menu-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; max-width:1000px; margin:auto; }

.menu-card{ background:#3d0e00; border-radius:18px; overflow:hidden; position:relative; transition:0.3s; }

.menu-card:hover{ transform:translateY(-6px); box-shadow:0 15px 30px rgba(0,0,0,0.5); }

.card-img{ width:100%; height:180px; object-fit:cover; display:block; transition:transform 0.4s ease; }

.menu-card:hover .card-img{ transform:scale(1.08); }

.card-content{ padding:15px; display:flex; justify-content:space-between; align-items:center; }

.card-name{font-weight:800;} .card-price{ background:var(--gold); color:#000; padding:6px 12px; border-radius:20px; font-weight:900; }

footer{ text-align:center; padding:20px; opacity:0.5; } </style>

</head>
<body><section class="hero">
  <div>
    <h1>Ali Doner Kebab</h1>
    <p>Chieti, Italy · Fresh & Homemade</p>
  </div>
</section><section class="menu-section">
  <h2 class="section-title">Our Menu</h2>  <div class="menu-cards"><div class="menu-card">
  <img class="card-img" src="./Screenshot_20260427_112326_Gallery.jpg" alt="Kebab Panino">
  <div class="card-content">
    <div class="card-name">Kebab Panino</div>
    <div class="card-price">€4.50</div>
  </div>
</div>

<div class="menu-card">
  <img class="card-img" src="https://images.unsplash.com/photo-1608039755401-742074f0548d?auto=format&fit=crop&w=800&q=80" alt="Kebab Piadina">
  <div class="card-content">
    <div class="card-name">Kebab Piadina</div>
    <div class="card-price">€5.00</div>
  </div>
</div>

<div class="menu-card">
  <img class="card-img" src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?auto=format&fit=crop&w=800&q=80" alt="Hot Dog">
  <div class="card-content">
    <div class="card-name">Hot Dog</div>
    <div class="card-price">€2.00</div>
  </div>
</div>

<div class="menu-card">
  <img class="card-img" src="https://images.unsplash.com/photo-1576107232684-1279f390859f?auto=format&fit=crop&w=800&q=80" alt="Fries">
  <div class="card-content">
    <div class="card-name">Patatine</div>
    <div class="card-price">€2.50+</div>
  </div>
</div>

  </div>
</section><footer>© 2026 Ali Doner Kebab · Chieti, Italy</footer></body>
</html>
