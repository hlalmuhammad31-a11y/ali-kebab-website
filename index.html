<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Doner Kebab – Chieti, Italy</title>

<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --red:#c0392b;
  --gold:#f1c40f;
  --dark:#1a0a00;
  --dark2:#2c1200;
  --cream:#fff8ee;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--dark);
  color:var(--cream);
  overflow-x:hidden;
}

/* HERO */
.hero{
  min-height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px 10px;
  position:relative;
  background:linear-gradient(to top,#2d0900,#0a0300);
}

.hero h1{
  font-family:'Alfa Slab One';
  font-size:4rem;
  color:var(--gold);
}

.hero p{
  opacity:0.8;
  margin-top:10px;
}

/* MENU */
.menu-section{
  background:var(--dark2);
  padding:20px 16px 60px;
}

.section-title{
  text-align:center;
  font-family:'Alfa Slab One';
  font-size:3rem;
  color:var(--gold);
  margin-bottom:30px;
}

.menu-cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  max-width:1200px;
  margin:auto;
}

.menu-card{
  background:#3d0e00;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}

.menu-card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.card-img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
  transition:transform 0.4s ease;
}

.menu-card:hover .card-img{
  transform:scale(1.08);
}

.card-content{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card-name{
  font-weight:800;
}

.card-price{
  background:var(--gold);
  color:#000;
  padding:6px 12px;
  border-radius:20px;
  font-weight:900;
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
}

/* MOBILE */
@media(max-width:900px){
  .menu-cards{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .menu-cards{
    grid-template-columns:1fr;
  }

  .hero h1{
    font-size:2.5rem;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <h1>Ali Doner Kebab</h1>
    <p>Chieti, Italy · Fresh & Homemade</p>

    <p style="margin-top:14px;font-size:1.4rem;font-weight:800;color:var(--gold);">
      🕙 Aperto Tutti i Giorni · 11:00 AM – 1:00 AM
    </p>
  </div>
</section>

<section class="menu-section">
  <h2 class="section-title" style="font-size:4rem;">Our Menu</h2>

  <div class="menu-cards">

    <!-- FIRST IMAGE -->
    <div class="menu-card">
      <img class="card-img" src="https://raw.githubusercontent.com/hlalmuhammad31-a11y/ali-kebab-website/main/pic1.jpg" alt="Kebab Panino">

      <div class="card-content">
        <div class="card-name">Kebab Panino</div>
        <div class="card-price">€4.50</div>
      </div>
    </div>

    <!-- SECOND IMAGE -->
    <div class="menu-card">
      <img class="card-img" src="https://raw.githubusercontent.com/hlalmuhammad31-a11y/ali-kebab-website/main/Pic2.jpg" alt="Kebab Piadina">

      <div class="card-content">
        <div class="card-name">Kebab Piadina</div>
        <div class="card-price">€5.00</div>
      </div>
    </div>

    <!-- THIRD IMAGE -->
    <div class="menu-card">
      <img class="card-img" src="https://raw.githubusercontent.com/hlalmuhammad31-a11y/ali-kebab-website/main/Pic3.jpg" alt="Hot Dog">

      <div class="card-content">
        <div class="card-name">Hot Dog</div>
        <div class="card-price">€2.00</div>
      </div>
    </div>

    <!-- FOURTH IMAGE -->
    <div class="menu-card">
      <img class="card-img" src="https://raw.githubusercontent.com/hlalmuhammad31-a11y/ali-kebab-website/main/Pic4.jpg" alt="Patatine">

      <div class="card-content">
        <div class="card-name">Patatine</div>
        <div class="card-price">€3.50+</div>
      </div>
    </div>

  </div>
</section>

<footer>© 2026 Ali Doner Kebab · Chieti, Italy</footer>

</body>
</html>
